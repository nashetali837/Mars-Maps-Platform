# Cloud-Init for AWS/GCP/Alibaba VM Deployment
# This script installs Docker and NVIDIA Container Toolkit automatically.

package_update: true
package_upgrade: true

packages:
  - docker.io
  - docker-compose
  - curl

runcmd:
  - systemctl start docker
  - systemctl enable docker
  # Install NVIDIA Container Toolkit (Simplified)
  - curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
  - curl -s -L https://nvidia.github.io/libnvidia-container/ubuntu22.04/libnvidia-container.list | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
  - apt-get update && apt-get install -y nvidia-container-toolkit
  - nvidia-ctk runtime configure --runtime=docker
  - systemctl restart docker
  # Clone and Start (Example)
  # - git clone https://github.com/user/mars-oss.git /opt/mars-oss
  # - cd /opt/mars-oss && docker-compose up -d
